media:
  input: public/uploads
  output: /uploads

content:
  - name: blog
    label: Blog Posts
    type: collection
    path: src/content/blog
    filename: "{primary}.mdx"
    subfolders: false
    view:
      fields: [title, pubDate, author, category, featured]
    fields:
      - name: id
        label: ID
        type: number
        required: true

      - name: slug
        label: Slug
        type: string
        required: true

      - name: title
        label: Title
        type: string
        required: true

      - name: description
        label: Description
        type: string
        required: true

      - name: imageUrl
        label: Image URL
        type: image

      - name: imageAlt
        label: Image Alt
        type: string

      - name: pubDate
        label: Publish Date
        type: string
        required: true

      - name: author
        label: Author
        type: string
        required: true

      - name: avatarUrl
        label: Avatar URL
        type: image

      - name: category
        label: Category
        type: string
        required: true

      - name: readTime
        label: Read Time
        type: number

      - name: featured
        label: Featured
        type: boolean
        default: false

      - name: body
        label: Body
        type: rich-text
